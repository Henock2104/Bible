<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jean 12:13</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* TON IMAGE EN ARRIÈRE-PLAN */
        background: url("bible3.jpg") no-repeat center/cover;
    }

    /* CADRE FLOU */
    .card {
        width: 80%;
        max-width: 400px;
        padding: 25px;

        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);

        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.3);

        text-align: center;
    }

  .text {
    color: white;
    font-size: 18px;
    line-height: 1.5;

    opacity: 0;
    transform: translateY(20px);

    animation: fadeInText 1.5s ease forwards;
}
    
 @keyframes fadeInText {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">
    <p class="text">
        Jean 12:13<br><br>
        "Ils prirent des branches de palmiers,<br>
        et allèrent au-devant de lui, en criant : 
        Hosanna ! Béni soit celui qui vient au nom du Seigneur,<br>
        le roi d'Israël !"
    </p>
</div>

</body>
</html>
